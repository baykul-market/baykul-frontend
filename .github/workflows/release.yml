name: Create Release PR

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      preid:
        description: 'Prerelease identifier (alpha, beta, rc)'
        required: false
        default: 'alpha'
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Bump version (No Tag)
        id: version
        run: |
          if [[ "${{ github.event.inputs.version_bump }}" == "prerelease" ]]; then
            NEW_VER=$(npm version prerelease --preid=${{ github.event.inputs.preid }} --no-git-tag-version)
          else
            NEW_VER=$(npm version ${{ github.event.inputs.version_bump }} --no-git-tag-version)
          fi
          echo "new_version=${NEW_VER#v}" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.RELEASE_PAT }} 
          commit-message: "chore(release): bump version to v${{ steps.version.outputs.new_version }}"
          title: "Release v${{ steps.version.outputs.new_version }}"
          body: |
            Automated version bump for release v${{ steps.version.outputs.new_version }}.
            
            ⚠️ **Note:** The GitHub Release and Git Tag will be generated automatically by a separate workflow when this PR is merged into `main`.
          branch: "release/v${{ steps.version.outputs.new_version }}"
          base: main
