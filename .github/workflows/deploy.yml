name: Beget Deployment

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build check
        run: npm run build
      - name: Run Tests
        run: npm run test

  build-and-push:
    needs: quality-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      TARGET_HOST: ${{ secrets.HOST_PROD }}
      CONTAINER_NAME: baykul-frontend-prod
      FRONTEND_PORT: ${{ vars.FRONTEND_PORT || '3000' }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Get Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.TARGET_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: REGISTRY,IMAGE_NAME,SHORT_SHA,CONTAINER_NAME,FRONTEND_PORT,GITHUB_TOKEN
          script: |
            set -e # This line ensures the pipeline fails if any docker command fails
            
            echo "$GITHUB_TOKEN" | docker login $REGISTRY -u ${{ github.actor }} --password-stdin
            
            FULL_IMAGE_NAME=$(echo "$REGISTRY/$IMAGE_NAME:sha-$SHORT_SHA" | tr '[:upper:]' '[:lower:]')
            
            docker pull $FULL_IMAGE_NAME
            
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true
            
            docker run -d --name $CONTAINER_NAME -p $FRONTEND_PORT:80 --restart always $FULL_IMAGE_NAME
            
            docker image prune -af --filter "until=24h" || true
